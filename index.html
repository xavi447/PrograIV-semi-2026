<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css"/>
    <!-- Default theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/themes/default.min.css"/>
    <!-- Semantic UI theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/themes/semantic.min.css"/>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <span style="color:black">USSS020224</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" href="#" @click="abrirVentana('autores')">Autores</a>
                        <a class="nav-link" href="#" @click="abrirVentana('libros')">Libros</a>
                    </div>
                </div>
            </div>
        </nav>
        <div id="appSistema" class="container py-4">
            <autores @buscar='buscar("busqueda_autores","obtenerAutores")' :forms="forms" ref="autores" v-show="forms.autores.mostrar"></autores>
            <busqueda_autores @modificar='modificar("autores","modificarAutor", $event)' ref="busqueda_autores" v-show="forms.busqueda_autores.mostrar"></busqueda_autores>
            <libros @buscar='buscar("busqueda_libros","obtenerLibros")' :forms="forms" ref="libros" v-show="forms.libros.mostrar"></libros>
            <busqueda_libros @modificar='modificar("libros","modificarLibro", $event)' ref="busqueda_libros" v-show="forms.busqueda_libros.mostrar"></busqueda_libros>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/4.2.0/dexie.min.js" integrity="sha512-LuXLH9xON6/aAGYxi4Z1Dx8588Z80gY3iMmGtUlYmblUc1ulC/cGHuANXIvm8fnIWp5ShUk2MRBIWylGguXF9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.11.1/sha256.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script src="componentes/autores.js"></script>
    <script src="componentes/busqueda_autores.js"></script>
    <script src="componentes/libros.js"></script>
    <script src="componentes/busqueda_libros.js"></script>
    
    <script src="main.js"></script>
</body>
</html>

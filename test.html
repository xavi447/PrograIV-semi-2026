<!DOCTYPE html>
<html>
<head>
    <title>Test Sistema Académico</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .pass { color: green; }
        .fail { color: red; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Test Sistema Académico - SQLite WASM OPFS</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        let testsPassed = 0;
        let testsFailed = 0;

        function logTest(name, pass, message = '') {
            const div = document.createElement('div');
            if (pass) {
                div.className = 'pass';
                div.textContent = `✓ ${name}`;
                testsPassed++;
            } else {
                div.className = 'fail';
                div.textContent = `✗ ${name} - ${message}`;
                testsFailed++;
            }
            results.appendChild(div);
        }

        // Test 1: Vue disponible
        setTimeout(() => {
            logTest('Vue cargado', typeof Vue !== 'undefined' && Vue.createApp);
        }, 100);

        // Test 2: UUID disponible
        setTimeout(() => {
            logTest('UUID disponible', typeof uuid !== 'undefined' && uuid.v4);
        }, 100);

        // Test 3: CryptoJS disponible
        setTimeout(() => {
            logTest('CryptoJS disponible', typeof CryptoJS !== 'undefined');
        }, 100);

        // Test 4: Alertify disponible
        setTimeout(() => {
            logTest('Alertify disponible', typeof alertify !== 'undefined');
        }, 100);

        // Test 5: sql.js iniciador disponible
        setTimeout(() => {
            logTest('sql.js disponible', typeof initSqlJs !== 'undefined', 
                `initSqlJs=${typeof initSqlJs}`);
        }, 500);

        // Test 6: db disponible
        setTimeout(() => {
            logTest('db disponible', typeof db !== 'undefined', 
                `db=${typeof db}`);
        }, 500);

        // Test 7: dbReady disponible
        setTimeout(() => {
            logTest('dbReady disponible', typeof dbReady !== 'undefined', 
                `dbReady=${typeof dbReady}`);
        }, 500);

        // Test 8: Esperar a dbReady
        setTimeout(async () => {
            try {
                const result = await Promise.race([
                    dbReady,
                    new Promise((_, rej) => setTimeout(() => rej('Timeout'), 10000))
                ]);
                logTest('BD inicializada en timeout', true);
            } catch (error) {
                logTest('BD inicializada en timeout', false, error.toString());
            }
        }, 1000);

        // Test 9: Verificar datos después de 3 segundos
        setTimeout(async () => {
            try {
                const alumnos = await db.alumnos.toArray();
                logTest('Tabla alumnos accesible', Array.isArray(alumnos),
                    `alumnos=${alumnos?.length || 'error'}`);
            } catch (error) {
                logTest('Tabla alumnos accesible', false, error.toString());
            }
        }, 3000);

        // Test 10: Componentes cargados
        setTimeout(() => {
            const required = [
                'alumnos', 'busqueda_alumnos', 
                'materias', 'busqueda_materias',
                'docentes', 'busqueda_docentes',
                'matriculas', 'busqueda_matriculas',
                'inscripciones', 'busqueda_inscripciones'
            ];
            
            const missing = required.filter(c => typeof window[c] === 'undefined');
            logTest('Componentes cargados', missing.length === 0,
                missing.length > 0 ? `Faltan: ${missing.join(', ')}` : '');
        }, 200);

        // Resumen final
        setTimeout(() => {
            const div = document.createElement('div');
            div.style.marginTop = '20px';
            div.style.fontWeight = 'bold';
            div.textContent = `Tests: ${testsPassed} pasados, ${testsFailed} fallidos`;
            results.appendChild(div);
        }, 4000);
    </script>
</body>
</html>
